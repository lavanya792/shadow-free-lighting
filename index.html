<!DOCTYPE html>
<html>

<head>
    <title>Shadow-Free Intelligent Lighting</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        #header {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            font-weight: bold;
            max-width: 60%;
        }

        #header p {
            font-size: 12px;
            opacity: 0.7;
            margin: 2px 0 0;
        }

        #info {
            position: absolute;
            top: 90px;
            left: 20px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            font-size: 14px;
        }

        /* ✅ FIXED CONTROL PANEL (NO OVERLAP NOW) */
        .dg {
            position: fixed !important;

            top: 120px !important;
            /* 🔥 KEY FIX */
            right: 20px !important;

            width: 260px !important;
            transform: scale(1) !important;

            background: rgba(0, 0, 0, 0.8) !important;
            border-radius: 12px !important;

            backdrop-filter: blur(10px);

            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);

            z-index: 9999 !important;
        }

        .dg .cr {
            width: 100% !important;
        }

        .dg .main {
            overflow: hidden !important;
        }

        .dg .close-button {
            display: none !important;
        }

        #divider {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            z-index: 10;
        }
    </style>
</head>

<body>

    <div id="header">
        Shadow-Free Intelligent Lighting
        <p>Real-time lighting optimization using linear algebra</p>
    </div>

    <div id="info">Loading...</div>
    <div id="divider"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dat.gui/build/dat.gui.min.js"></script>

    <script>

        function normalize(v) {
            let len = Math.sqrt(v.x * v.x + v.y * v.y + v.z * v.z);
            return { x: v.x / len, y: v.y / len, z: v.z / len };
        }

        function dot(a, b) {
            return a.x * b.x + a.y * b.y + a.z * b.z;
        }

        function project(v, basis) {
            let res = { x: 0, y: 0, z: 0 };
            basis.forEach(u => {
                let d = dot(v, u);
                res.x += d * u.x;
                res.y += d * u.y;
                res.z += d * u.z;
            });
            return normalize(res);
        }

        function leastSquares(lights) {
            let avg = { x: 0, y: 0, z: 0 };
            lights.forEach(l => {
                avg.x += l.x;
                avg.y += l.y;
                avg.z += l.z;
            });
            avg.x /= lights.length;
            avg.y /= lights.length;
            avg.z /= lights.length;
            return normalize(avg);
        }

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setScissorTest(true);
        document.body.appendChild(renderer.domElement);

        const scene1 = new THREE.Scene();
        const scene2 = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 4);

        function createFloor() {
            const geo = new THREE.PlaneGeometry(10, 10, 50, 50);
            const colors = [];

            for (let i = 0; i < geo.attributes.position.count; i++) {
                colors.push(0, 1, 0);
            }

            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const mat = new THREE.MeshStandardMaterial({
                vertexColors: true,
                side: THREE.DoubleSide
            });

            const floor = new THREE.Mesh(geo, mat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;

            return floor;
        }

        function createScene(scene) {

            const floor = createFloor();
            scene.add(floor);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.castShadow = true;
            scene.add(light);

            scene.add(new THREE.AmbientLight(0x404040));

            const positions = [
                [-1, 0.5, -1],
                [1, 0.5, -1],
                [-1, 0.5, 1],
                [1, 0.5, 1],
                [0, 0.5, 0],
                [0, 0.5, -2]
            ];

            positions.forEach(p => {
                let box = new THREE.Mesh(
                    new THREE.BoxGeometry(),
                    new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
                );
                box.position.set(...p);
                box.castShadow = true;
                scene.add(box);
            });

            return { light, floor };
        }

        const s1 = createScene(scene1);
        const s2 = createScene(scene2);

        const params = { x: 1, y: 2, z: 1, mode: "projection" };

        const gui = new dat.GUI();
        gui.add(params, 'x', -5, 5);
        gui.add(params, 'y', -5, 5);
        gui.add(params, 'z', -5, 5);
        gui.add(params, 'mode', ["raw", "projection", "leastSquares", "auto"]);

        const targets = [
            { x: 1, y: 1, z: 0 },
            { x: 0, y: 1, z: 1 },
            { x: 1, y: 0.5, z: 1 }
        ];

        let t = 0;

        function updateCamera() {
            t += 0.01;
            let r = 4;
            camera.position.x = Math.sin(t) * r;
            camera.position.z = Math.cos(t) * r;
            camera.position.y = 3;
            camera.lookAt(0, 0.5, 0);
        }

        function updateHeatmap(floor, intensity) {
            let col = floor.geometry.attributes.color;
            for (let i = 0; i < col.count; i++) {
                col.setX(i, 1 - intensity);
                col.setY(i, intensity);
                col.setZ(i, 0);
            }
            col.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);

            updateCamera();

            let L = normalize({ x: params.x, y: params.y, z: params.z });

            let forward = new THREE.Vector3();
            camera.getWorldDirection(forward);

            let up = new THREE.Vector3(0, 1, 0);
            let right = new THREE.Vector3().crossVectors(forward, up).normalize();
            let newUp = new THREE.Vector3().crossVectors(right, forward).normalize();

            let basis = [
                { x: right.x, y: right.y, z: right.z },
                { x: newUp.x, y: newUp.y, z: newUp.z }
            ];

            let L_opt = L;

            if (params.mode === "projection") L_opt = project(L, basis);

            if (params.mode === "leastSquares") {
                let best = leastSquares(targets);
                L_opt = project(best, basis);
            }

            if (params.mode === "auto") {
                let best = leastSquares(targets);
                let target = project(best, basis);
                L.x += (target.x - L.x) * 0.05;
                L.y += (target.y - L.y) * 0.05;
                L.z += (target.z - L.z) * 0.05;
                L_opt = L;
            }

            s1.light.position.set(L.x * 5, L.y * 5, L.z * 5);
            s2.light.position.set(L_opt.x * 5, L_opt.y * 5, L_opt.z * 5);

            let I_raw = Math.max(0, dot(L, { x: 0, y: 1, z: 0 }));
            let I_opt = Math.max(0, dot(L_opt, { x: 0, y: 1, z: 0 }));

            updateHeatmap(s1.floor, I_raw);
            updateHeatmap(s2.floor, I_opt);

            document.getElementById("info").innerHTML =
                `<b>RAW:</b> ${I_raw.toFixed(2)}<br>
             <b>OPTIMIZED:</b> ${I_opt.toFixed(2)}<br>
             <b>MODE:</b> ${params.mode}`;

            renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissor(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.render(scene1, camera);

            renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissor(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.render(scene2, camera);
        }

        animate();

    </script>

</body>

</html>
