<!DOCTYPE html>
<html>

<head>
    <title>Intelligent Lighting Analyzer (Advanced)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            font-family: Arial;
        }
    </style>
</head>

<body>

    <div id="info">Loading...</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dat.gui/build/dat.gui.min.js"></script>

    <script>

        // ================= MATH =================

        function normalize(v) {
            let len = Math.sqrt(v.x * v.x + v.y * v.y + v.z * v.z);
            return { x: v.x / len, y: v.y / len, z: v.z / len };
        }

        function dot(a, b) {
            return a.x * b.x + a.y * b.y + a.z * b.z;
        }

        function project(v, basis) {
            let res = { x: 0, y: 0, z: 0 };
            basis.forEach(u => {
                let d = dot(v, u);
                res.x += d * u.x;
                res.y += d * u.y;
                res.z += d * u.z;
            });
            return normalize(res);
        }

        function leastSquares(lights) {
            let avg = { x: 0, y: 0, z: 0 };
            lights.forEach(l => {
                avg.x += l.x;
                avg.y += l.y;
                avg.z += l.z;
            });
            avg.x /= lights.length;
            avg.y /= lights.length;
            avg.z /= lights.length;
            return normalize(avg);
        }

        // ================= RENDERER =================

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // ================= SCENES =================

        const scene1 = new THREE.Scene(); // RAW
        const scene2 = new THREE.Scene(); // OPTIMIZED

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(4, 4, 6);

        // ================= FLOOR HEATMAP =================

        function createFloor() {
            const geo = new THREE.PlaneGeometry(10, 10, 50, 50);
            const colors = [];

            for (let i = 0; i < geo.attributes.position.count; i++) {
                colors.push(0, 1, 0);
            }

            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const mat = new THREE.MeshStandardMaterial({
                vertexColors: true,
                side: THREE.DoubleSide
            });

            const floor = new THREE.Mesh(geo, mat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;

            return floor;
        }

        // ================= SCENE BUILDER =================

        function createScene(scene) {

            const floor = createFloor();
            scene.add(floor);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.castShadow = true;
            scene.add(light);

            scene.add(new THREE.AmbientLight(0x404040));

            // Multiple objects
            for (let i = 0; i < 6; i++) {
                let box = new THREE.Mesh(
                    new THREE.BoxGeometry(),
                    new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
                );
                box.position.set(Math.random() * 4 - 2, 0.5, Math.random() * 4 - 2);
                box.castShadow = true;
                scene.add(box);
            }

            return { light, floor };
        }

        const s1 = createScene(scene1);
        const s2 = createScene(scene2);

        // ================= UI =================

        const params = {
            x: 1, y: 2, z: 1,
            mode: "projection"
        };

        const gui = new dat.GUI();
        gui.add(params, 'x', -5, 5);
        gui.add(params, 'y', -5, 5);
        gui.add(params, 'z', -5, 5);
        gui.add(params, 'mode', ["raw", "projection", "leastSquares", "auto"]);

        // ================= TARGETS =================

        const targets = [
            { x: 1, y: 1, z: 0 },
            { x: 0, y: 1, z: 1 },
            { x: 1, y: 0.5, z: 1 }
        ];

        // ================= TRAIL =================

        const trailPoints = [];
        const trailGeo = new THREE.BufferGeometry();
        const trailMat = new THREE.LineBasicMaterial({ color: 0xff0000 });
        const trail = new THREE.Line(trailGeo, trailMat);
        scene2.add(trail);

        // ================= CAMERA MOTION =================

        let t = 0;

        function updateCamera() {
            t += 0.01;
            camera.position.x = Math.sin(t) * 6;
            camera.position.z = Math.cos(t) * 6;
            camera.lookAt(0, 0, 0);
        }

        // ================= HEATMAP =================

        function updateHeatmap(floor, intensity) {
            let col = floor.geometry.attributes.color;

            for (let i = 0; i < col.count; i++) {
                col.setX(i, 1 - intensity);
                col.setY(i, intensity);
                col.setZ(i, 0);
            }

            col.needsUpdate = true;
        }

        // ================= LOOP =================

        function animate() {
            requestAnimationFrame(animate);

            updateCamera();

            let L = normalize({ x: params.x, y: params.y, z: params.z });

            let forward = new THREE.Vector3();
            camera.getWorldDirection(forward);

            let up = new THREE.Vector3(0, 1, 0);
            let right = new THREE.Vector3().crossVectors(forward, up).normalize();
            let newUp = new THREE.Vector3().crossVectors(right, forward).normalize();

            let basis = [
                { x: right.x, y: right.y, z: right.z },
                { x: newUp.x, y: newUp.y, z: newUp.z }
            ];

            let L_opt = L;

            if (params.mode === "projection") {
                L_opt = project(L, basis);
            }

            if (params.mode === "leastSquares") {
                let best = leastSquares(targets);
                L_opt = project(best, basis);
            }

            if (params.mode === "auto") {
                let best = leastSquares(targets);
                let target = project(best, basis);

                L.x += (target.x - L.x) * 0.05;
                L.y += (target.y - L.y) * 0.05;
                L.z += (target.z - L.z) * 0.05;

                L_opt = L;
            }

            // Apply lights
            s1.light.position.set(L.x * 5, L.y * 5, L.z * 5);
            s2.light.position.set(L_opt.x * 5, L_opt.y * 5, L_opt.z * 5);

            // Intensities
            let N = { x: 0, y: 1, z: 0 };
            let I_raw = Math.max(0, dot(L, N));
            let I_opt = Math.max(0, dot(L_opt, N));

            updateHeatmap(s1.floor, I_raw);
            updateHeatmap(s2.floor, I_opt);

            // Trail
            trailPoints.push(new THREE.Vector3(L_opt.x * 5, L_opt.y * 5, L_opt.z * 5));
            if (trailPoints.length > 100) trailPoints.shift();
            trailGeo.setFromPoints(trailPoints);

            // Info
            document.getElementById("info").innerHTML =
                "RAW: " + I_raw.toFixed(2) +
                "<br>OPTIMIZED: " + I_opt.toFixed(2) +
                "<br>MODE: " + params.mode;

            // Split screen
            renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.render(scene1, camera);

            renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.render(scene2, camera);
        }

        animate();

    </script>

</body>

</html>
